<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.Y.O. — Agent You Own</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #141413;
            color: #FAF9F5;
            font-family: "DM Sans", system-ui, sans-serif;
            overflow: hidden;
        }

        #ascii-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ascii-container canvas {
            max-width: 100%;
            max-height: 100%;
        }

        .overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to top, rgba(20,20,19,0.9), transparent);
            z-index: 10;
            pointer-events: none;
        }

        .overlay-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            font-family: "DM Sans", system-ui, sans-serif;
        }

        .logo span {
            color: #FAAF4F;
        }

        .tagline {
            font-size: 1.125rem;
            color: rgba(250, 249, 245, 0.7);
            margin-bottom: 1.5rem;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: #FAAF4F;
            color: #141413;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            pointer-events: auto;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(250, 175, 79, 0.3);
        }

        .hint {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(250, 249, 245, 0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }
            .tagline {
                font-size: 0.875rem;
            }
            .overlay {
                padding: 1.5rem;
            }
        }
    </style>
    <!-- Three.js from CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div class="hint">Bewegen Sie die Maus · Move your mouse</div>
    <div id="ascii-container"></div>

    <div class="overlay">
        <div class="overlay-content">
            <div class="logo">A.<span>Y.</span>O.</div>
            <p class="tagline">Agent You Own – Autonomous AI for Swiss KMUs</p>
            <a href="index.html" class="cta">
                Explore Solutions
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x141413);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 8;

        // Renderer (hidden, used for ASCII effect)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // ASCII Effect
        const effect = new AsciiEffect(renderer, ' @#S%?*+;:,. ', {
            resolution: 0.15,
            scale: 1,
            color: false,
            alpha: false
        });
        effect.setSize(window.innerWidth, window.innerHeight);
        effect.domElement.style.color = '#FAAF4F';
        effect.domElement.style.backgroundColor = '#141413';
        document.getElementById('ascii-container').appendChild(effect.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0xFAAF4F, 0.5);
        backLight.position.set(-5, 0, -5);
        scene.add(backLight);

        // Create abstract "face" using combined geometries (low poly, optimized)
        const headGroup = new THREE.Group();

        // Main head sphere (low poly for smaller file and better ASCII effect)
        const headGeometry = new THREE.IcosahedronGeometry(1.5, 1);
        const headMaterial = new THREE.MeshStandardMaterial({
            color: 0xFAF9F5,
            roughness: 0.3,
            metalness: 0.2
        });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        headGroup.add(head);

        // Visor/Eye area - elongated box
        const visorGeometry = new THREE.BoxGeometry(1.8, 0.4, 0.3);
        const visorMaterial = new THREE.MeshStandardMaterial({
            color: 0x141413,
            roughness: 0.1,
            metalness: 0.8
        });
        const visor = new THREE.Mesh(visorGeometry, visorMaterial);
        visor.position.set(0, 0.2, 1.3);
        headGroup.add(visor);

        // Left eye glow
        const eyeGeometry = new THREE.SphereGeometry(0.15, 8, 8);
        const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0xFAAF4F });

        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.5, 0.2, 1.45);
        headGroup.add(leftEye);

        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(0.5, 0.2, 1.45);
        headGroup.add(rightEye);

        // Chin/mouth area
        const chinGeometry = new THREE.CylinderGeometry(0.6, 0.4, 0.8, 8);
        const chin = new THREE.Mesh(chinGeometry, headMaterial);
        chin.position.set(0, -1, 0.8);
        chin.rotation.x = 0.3;
        headGroup.add(chin);

        // Ear shapes (small cylinders)
        const earGeometry = new THREE.CylinderGeometry(0.3, 0.2, 0.4, 6);

        const leftEar = new THREE.Mesh(earGeometry, headMaterial);
        leftEar.position.set(-1.4, 0, 0);
        leftEar.rotation.z = 0.5;
        headGroup.add(leftEar);

        const rightEar = new THREE.Mesh(earGeometry, headMaterial);
        rightEar.position.set(1.4, 0, 0);
        rightEar.rotation.z = -0.5;
        headGroup.add(rightEar);

        // Neck
        const neckGeometry = new THREE.CylinderGeometry(0.5, 0.6, 1, 8);
        const neck = new THREE.Mesh(neckGeometry, headMaterial);
        neck.position.set(0, -2, 0);
        headGroup.add(neck);

        scene.add(headGroup);

        // Mouse tracking
        const mouse = { x: 0, y: 0 };
        const targetRotation = { x: 0, y: 0 };
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        function onDocumentMouseMove(event) {
            mouse.x = (event.clientX - windowHalfX) / windowHalfX;
            mouse.y = (event.clientY - windowHalfY) / windowHalfY;
        }

        function onDocumentTouchMove(event) {
            if (event.touches.length === 1) {
                mouse.x = (event.touches[0].clientX - windowHalfX) / windowHalfX;
                mouse.y = (event.touches[0].clientY - windowHalfY) / windowHalfY;
            }
        }

        document.addEventListener('mousemove', onDocumentMouseMove, false);
        document.addEventListener('touchmove', onDocumentTouchMove, false);

        // Animation loop
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Smooth follow mouse
            targetRotation.x = mouse.y * 0.5;
            targetRotation.y = mouse.x * 0.5;

            // Smooth interpolation (lerp)
            headGroup.rotation.x += (targetRotation.x - headGroup.rotation.x) * 0.05;
            headGroup.rotation.y += (targetRotation.y - headGroup.rotation.y) * 0.05;

            // Subtle idle animation
            headGroup.position.y = Math.sin(time) * 0.1;

            // Render ASCII effect
            effect.render(scene, camera);
        }

        // Handle resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onWindowResize, false);

        // Start
        animate();
    </script>
</body>
</html>
